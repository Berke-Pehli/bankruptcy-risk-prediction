[workspace]
name = "bankruptcy-risk-prediction"
version = "0.1.0"
description = "Time-aware bankruptcy prediction for US public companies."
authors = ["Berke Pehlivan"]
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[dependencies]
python = "3.12.*"
numpy = ">=2.0,<3"
pandas = ">=2.2,<3"
pyarrow = ">=17,<21"
scipy = ">=1.14,<2"
scikit-learn = ">=1.5,<2"
statsmodels = ">=0.14,<1"
matplotlib = ">=3.9,<4"
seaborn = ">=0.13,<1"
joblib = ">=1.4,<2"
pytask = ">=0.5,<1"
pytest = ">=8,<9"
pytest-cov = ">=5,<7"
ruff = ">=0.8,<1"
jupyterlab = ">=4,<5"
ipykernel = ">=6,<7"
hatchling = ">=1.26,<2"

[activation.env]
PYTHONPATH = "$PIXI_PROJECT_ROOT/src"

[tasks]
pipeline = "pytask"
test = "pytest"
test-cov = "pytest --cov=bankruptcy_risk --cov-report=term-missing"
lint = "ruff check ."
format = "ruff format ."
check = { depends-on = ["lint", "test"] }
all = { depends-on = ["check", "pipeline"] }
